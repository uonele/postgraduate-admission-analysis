site_name: 招考数据深潜分析中心
site_author: "Data Analysis Team"
site_description: "五大公司年度全链路招考录取全景总览"

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
  palette:
    # 浅色模式设置
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到暗色模式
    # 暗色模式设置
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到亮色模式

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true

nav:
  - 🏠 概览首页: index.md
  - 🏢 五大公司全链路漏斗分析:
      - 2024-2025年度全景总览表: 24年/五大公司全链路总览表.md
      - 人才梯队跨层深度解剖: 24年/五大公司人才梯队解剖.md
      - 细分岗位全链路阶段分析: 24年/五大公司细分岗位分析.md
  - 📂 历年分类汇总 (2024):
      - 电科招聘初复试数据分析: 24年/初复试数据分析2024.md
      - 分类数据展示: 24年/分类版汇总.md
